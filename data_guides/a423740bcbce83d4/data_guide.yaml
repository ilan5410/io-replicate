                    O84, P85, Q86, Q87-88, R90-92, R93, S94, S95, S96, T, U]
  n_spec_industries: 64

  # IO table uses CPA_2008 prefix system (64 leaf codes, matching spec 1-to-1 after normalization)
  data_industries_io_normalized: [A01, A02, A03, B, C10-12, C13-15, C16, C17,
                                   C18, C19, C20, C21, C22, C23, C24, C25, C26,
                                   C27, C28, C29, C30, C31-32, C33, D35, E36,
                                   E37-39, F, G45, G46, G47, H49, H50, H51,
                                   H52, H53, I, J58, J59-60, J61, J62-63, K64,
                                   K65, K66, L, M69-70, M71, M72, M73, M74-75,
                                   N77, N78, N79, N80-82, O84, P85, Q86, Q87-88,
                                   R90-92, R93, S94, S95, S96, T, U]

  # Satellite uses NACE Rev.2 codes (same system, different notation for some ranges)
  industry_code_system: CPA_2008     # IO table uses CPA_2008 (prefixed with "CPA_")
  satellite_code_system: NACE_Rev2   # Satellite uses bare NACE Rev.2 codes

  industry_mismatches:
    - code_in_spec: B05-09
      code_in_io:   CPA_B           # IO table aggregates all mining as "B" (no 05-09 suffix)
      resolution:   "CPA_B == B05-09 (single-product mining sector); treat as equivalent"
    - issue: "IO codes use underscore for some multi-industry ranges (CPA_C31_32, CPA_J59_60, CPA_M69_70, CPA_M74_75, CPA_Q87_88) — normalize underscore→hyphen to match spec"
    - issue: "Satellite NACE codes use 'C' as separator within ranges (C10-C12) and underscores (J59_J60, C31_C32) — normalize to hyphen (C10-12, J59-60, C31-32)"
    - issue: "Satellite code 'L68A' (real estate excluding owner-occupied) maps to spec 'L' — use L68A as the leaf employment figure for sector L"

  notes:
    - "All 29 spec countries are present in the IO table. US employment must be sourced elsewhere or imputed (not in satellite)."
    - "IO table has 4 years (2010–2013); paper uses 2010 only — filter to '2010 ' column (strip trailing space)."
    - "Satellite has data for 1975–2025; filter to '2010 ' column for reference year."
    - "To build the employment intensity vector: filter satellite to unit=THS_PER, na_item=EMP_DC, nace_r2∈leaf_codes, geo∈spec_countries."
    - "Strip 'CPA_' prefix from IO industry codes before matching to satellite NACE codes."
    - "Normalize all code separators: replace '_' with '-' in multi-industry ranges."
    - "prd_ava 'B2A3G' is a total-goods aggregate row — exclude from the Z matrix industry block."
    - "Special IO rows D1/D21X31/D29X39/OP_NRES/OP_RES represent taxes, subsidies, value added — exclude from intermediate block."
    - "Final-demand columns in prd_use (P3_S13/P3_S14/P3_S15/P51G/P5M) = government/household/NPISH consumption and investment — keep for final demand vector, exclude from intermediate demand block."
