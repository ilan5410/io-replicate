  io_table:
    path: data/raw/naio_10_fcp_ip1.tsv.gz
    format: tsv_gz
    shape: [11060700, 5]
    columns:
      - "freq,prd_use,prd_ava,c_dest,unit,c_orig\\TIME_PERIOD"   # composite key col
      - "2010 "
      - "2011 "
      - "2012 "
      - "2013 "
    dtypes:
      "freq,prd_use,prd_ava,c_dest,unit,c_orig\\TIME_PERIOD": string
      "2010 ": float64
      "2011 ": float64
      "2012 ": float64
      "2013 ": float64
    sample_rows: 500

    # ---- Eurostat composite-key layout ----
    # The FIRST column contains ALL dimension values concatenated with commas.
    # Split on "," to recover 6 dimension fields:
    #   pos 0 → freq      (always "A" = annual)
    #   pos 1 → prd_use   (CPA product code for USE dimension / column sector)
    #   pos 2 → prd_ava   (CPA product code for AVAILABLE / row sector; also special codes)
    #   pos 3 → c_dest    (destination / purchasing country)
    #   pos 4 → unit      (always "MIO_EUR")
    #   pos 5 → c_orig    (origin / supplying country, incl. "DOM" for domestic)
    # The REMAINING columns are year-values (2010–2013), already numeric (float64).
    composite_key_column: "freq,prd_use,prd_ava,c_dest,unit,c_orig\\TIME_PERIOD"
    composite_key_dimensions: [freq, prd_use, prd_ava, c_dest, unit, c_orig]

    semantic:
      type: io_table
      country_dimension: [c_orig, c_dest]
      industry_dimension: [prd_ava, prd_use]
      value_column: "2010 "          # reference year column; strip trailing space
      time_column: null              # years are wide columns, not a single column
      time_years: ["2010", "2011", "2012", "2013"]
      unit_column: unit              # embedded in composite key at position 4
      unit_values: [MIO_EUR]

    codes:
      # c_orig has one extra value: "DOM" (domestic supply, no cross-border origin)
      c_orig: [AL, AR, AT, AU, BE, BG, BR, CA, CH, CN, CY, CZ, DE, DK, DOM,
               EE, EL, ES, FI, FR, HR, HU, ID, IE, IN, IT, JP, KR, LT, LU,
               LV, ME, MK, MT, MX, NL, NO, PL, PT, RO, RS, RU, SA, SE, SI,
               SK, TR, UK, US, WRL_REST, ZA]
      c_dest: [AL, AR, AT, AU, BE, BG, BR, CA, CH, CN, CY, CZ, DE, DK, EE,
               EL, ES, FI, FR, HR, HU, ID, IE, IN, IT, JP, KR, LT, LU, LV,
               ME, MK, MT, MX, NL, NO, PL, PT, RO, RS, RU, SA, SE, SI, SK,
               TR, UK, US, WRL_REST, ZA]
      # prd_ava: 65 CPA industry codes + 5 special aggregates/valuation rows
      prd_ava_cpa_leaf: [CPA_A01, CPA_A02, CPA_A03, CPA_B, CPA_C10-12, CPA_C13-15,
                         CPA_C16, CPA_C17, CPA_C18, CPA_C19, CPA_C20, CPA_C21,
                         CPA_C22, CPA_C23, CPA_C24, CPA_C25, CPA_C26, CPA_C27,
                         CPA_C28, CPA_C29, CPA_C30, CPA_C31_32, CPA_C33, CPA_D35,
                         CPA_E36, CPA_E37-39, CPA_F, CPA_G45, CPA_G46, CPA_G47,
                         CPA_H49, CPA_H50, CPA_H51, CPA_H52, CPA_H53, CPA_I,
                         CPA_J58, CPA_J59_60, CPA_J61, CPA_J62_63, CPA_K64,
                         CPA_K65, CPA_K66, CPA_L, CPA_M69_70, CPA_M71, CPA_M72,
                         CPA_M73, CPA_M74_75, CPA_N77, CPA_N78, CPA_N79,
                         CPA_N80-82, CPA_O84, CPA_P85, CPA_Q86, CPA_Q87_88,
                         CPA_R90-92, CPA_R93, CPA_S94, CPA_S95, CPA_S96,
                         CPA_T, CPA_U]
      prd_ava_special: [B2A3G, D1, D21X31, D29X39, OP_NRES, OP_RES]
      # prd_use: 64 CPA leaf codes + 5 final-demand / value-added row identifiers
      prd_use_final_demand: [P3_S13, P3_S14, P3_S15, P51G, P5M]
      years: ["2010", "2011", "2012", "2013"]
      n_countries_origin: 51        # including DOM and WRL_REST
      n_countries_dest: 50
      n_industries_prd_ava: 70      # 64 CPA leaf + 6 special
      n_industries_prd_use: 69      # 64 CPA leaf + 5 final-demand

    quirks:
      - "Eurostat TSV long-format: first column is a composite key — must split on ',' to recover 6 dimensions."
      - "Column headers for years have a trailing space (e.g. '2010 ') — strip whitespace before use."
      - "c_orig contains 'DOM' (domestic flows, no bilateral partner) — this is not a country code; must be handled separately or filtered."
      - "WRL_REST in c_orig represents rest-of-world and maps to spec's 'ROW' external entity."
      - "prd_ava contains 'B2A3G' (total goods aggregate) and valuation/tax rows (D1, D21X31, D29X39, OP_NRES, OP_RES) — these are NOT industry rows; filter to CPA_ prefixed codes only for the Z matrix."
      - "prd_use contains final-demand codes (P3_S13, P3_S14, P3_S15, P51G, P5M) — these are NOT industry columns; filter to CPA_ prefixed codes only for intermediate demand block."
      - "CPA codes use underscore as range separator in some cases (CPA_C31_32, CPA_J59_60) — normalize to hyphen to match NACE spec codes (C31-32, J59-60)."
      - "CPA_B covers all mining (B05–B09) — spec uses 'B05-09'; they are equivalent but the code label differs."
      - "No missing values (':') found in the 2010 numeric column — all values are numeric float64."
      - "The file is 11 million rows long (wide-to-long): reading the full file requires ~5–10 GB RAM."
      - "Data covers 2010–2013 only; reference year for the paper is 2010."


