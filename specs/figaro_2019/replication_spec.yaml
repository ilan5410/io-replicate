data_sources:
  io_table:
    type: figaro_iciot
    eurostat_code: naio_10_fcp_ip1
    table_variant: product_by_product
    unit: MIO_EUR
    url: "https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data/naio_10_fcp_ip1"
    notes: >
      Paper uses industry-by-industry IC-IOT (not publicly available).
      This pipeline uses product-by-product as proxy. Results will differ — documented in limitations.
      50 countries in full dataset (EU-28 + NO/CH + 20 non-EU + WRL_REST), years 2010-2013.
    api_quirks:
      - "Must query one c_orig at a time — full table is too large"
      - "Dimensions: c_orig, c_dest, prd_ava (row product), prd_use (col product), unit=MIO_EUR, time"
      - "64 CPA product codes + 6 value-added rows in prd_ava; 64 CPA + 5 final-demand codes in prd_use"
  satellite_account:
    type: employment
    eurostat_code: nama_10_a64_e
    measure: EMP_DC
    unit: THS_PER
    url: "https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data/nama_10_a64_e"
    filters:
      na_item: EMP_DC
      unit: THS_PER
    api_quirks:
      - "The nace_r2 filter silently returns 0 rows — always download all NACE codes and post-filter in Python"
      - "Returns ~94 NACE codes per country (aggregates + leaves); filter to leaf codes only"
      - "Query one geo at a time"
    notes: "Persons employed (EMP_DC) in thousands"

methodology:
  leontief_system: eu_only
  export_definition: arto_2015
  export_definition_detail: |
    The EU-28 Leontief inverse is built from intra-EU intermediate flows only (Z).
    The export vector e contains ALL EU→non-EU flows:
    - EU→non-EU intermediate flows (EU products used as inputs in US/RoW industries)
    - EU→non-EU final demand flows (EU products consumed/invested in US/RoW)
    Intra-EU final demand (EU household/gov consumption of EU products) is excluded
    from both Z and e — it is outside the model scope entirely.
    Reference: Arto et al. (2015), "Global value chains and the EU industry".
  satellite_coefficient: employment_per_output
  notes:
    - "Matrix dimensions: 28 EU countries × 64 NACE industries = 1,792"
    - "US and RoW are in the IC-IOT system but excluded from the EU Leontief sub-matrix"

decompositions:
  - name: domestic_spillover
    description: "Employment in country r supported by country s's exports, decomposed into domestic (r=s) and spillover (r≠s)"
    formula: "em[r,s] = d^r' · L^{rs} · e^s"
  - name: direct_indirect
    description: "Direct effect = employment without multiplier; indirect = total domestic minus direct"
    formula: "Direct: d_i^r · e_i^r; Indirect: d^r' · L^{rr} · e^r - d^r' · e^r"

outputs:
  tables:
    - id: table_1
      title: "Employment and exports to non-member countries by EU member state (2010)"
      columns: [country, total_employment_THS, exports_mio_eur]
      source_data: [employment_vector, export_vector]
      sort: null
    - id: table_3
      title: "Employment supported by exports to non-member countries, ranked by spillover share"
      columns: [country, total_by_country_THS, domestic_effect_THS, spillover_generated_THS, domestic_share_pct, spillover_share_pct]
      source_data: [country_decomposition]
      sort: {by: spillover_share_pct, order: ascending}
    - id: table_4
      title: "Employment by industry of employment and product of export (10-sector, thousands)"
      type: matrix
      source_data: [industry_table4]
      sort: null
    - id: annex_c
      title: "Employment in EU member states supported by exports of each member state (28×28 matrix)"
      type: matrix
      source_data: [annex_c_matrix]
      sort: null
  figures:
    - id: figure_1
      title: "Employment supported by EU exports to non-member countries (thousand persons, 2010)"
      type: grouped_bar
      series:
        - {name: total_in_country_THS, label: "Employment IN member state supported by all EU exports"}
        - {name: total_by_country_THS, label: "Total employment supported BY member state exports"}
      sort: {by: total_by_country_THS, order: descending}
      source_data: [country_decomposition]
    - id: figure_2
      title: "Employment supported by exports as % of total employment (2010)"
      type: stacked_bar
      series:
        - {name: domestic_share_pct, label: "Domestic"}
        - {name: spillover_share_pct, label: "Spillover generated"}
      overlay:
        - {name: export_emp_share_pct, label: "Total export employment share", marker: "diamond"}
      sort: {by: export_emp_share_pct, order: descending}
      source_data: [country_decomposition]
    - id: figure_3
      title: "Employment by product sector (% of total employment supported, domestic vs spillover)"
      type: stacked_bar
      series:
        - {name: domestic_THS, label: "Domestic"}
        - {name: spillover_THS, label: "Spillover"}
      sort: null
      groups: ten_sector
      source_data: [industry_figure3]

benchmarks:
  tolerances:
    warning_pct: 10
    error_pct: 25
  values:
    - name: "EU-28 total employment"
      expected: 225677
      unit: thousands
      source: {file: country_decomposition, op: sum_column, column: total_employment_THS}
    - name: "Total export-supported employment"
      expected: 25597
      unit: thousands
      source: {file: country_decomposition, op: sum_column, column: total_by_country_THS}
    - name: "Germany jobs in Germany (domestic)"
      expected: 5700
      unit: thousands
      approximate: true
      source: {file: country_decomposition, op: lookup, filter: {country: DE}, column: domestic_effect_THS}
    - name: "Germany export-supported total (by Germany)"
      expected: 6056
      unit: thousands
      source: {file: country_decomposition, op: lookup, filter: {country: DE}, column: total_by_country_THS}
    - name: "Luxembourg spillover share"
      expected: 46.7
      unit: percent
      source: {file: country_decomposition, op: lookup, filter: {country: LU}, column: spillover_share_pct}
    - name: "Romania spillover share"
      expected: 4.5
      unit: percent
      source: {file: country_decomposition, op: lookup, filter: {country: RO}, column: spillover_share_pct}
    - name: "Industry B-E total employment"
      expected: 9889
      unit: thousands
      source: {file: industry_figure3, op: lookup, filter: {sector: "B-E"}, column: total_employment_THS}
  notes:
    - "Using product-by-product tables; paper uses industry-by-industry. Expect systematic differences."
    - "Employment data vintage may differ from paper's vintage."
    - "LU and MT may have missing confidential employment data."

output_schema:
  country_decomposition:
    file: country_decomposition.csv
    description: "One row per EU analysis entity — employment decomposition by country"
    key_column: country
    columns:
      - {name: country,                 type: str,   description: "ISO country code (e.g. DE, FR)"}
      - {name: total_employment_THS,    type: float, unit: thousands, description: "Total employment in country"}
      - {name: domestic_effect_THS,     type: float, unit: thousands, description: "Employment in country supported by own exports"}
      - {name: spillover_received_THS,  type: float, unit: thousands, description: "Employment in country supported by other EU exports"}
      - {name: spillover_generated_THS, type: float, unit: thousands, description: "Employment generated elsewhere by this country's exports"}
      - {name: direct_effect_THS,       type: float, unit: thousands, description: "Direct employment effect (no multiplier)"}
      - {name: indirect_effect_THS,     type: float, unit: thousands, description: "Indirect employment effect (via supply chain)"}
      - {name: total_in_country_THS,    type: float, unit: thousands, description: "Total employment IN country supported by all EU exports"}
      - {name: total_by_country_THS,    type: float, unit: thousands, description: "Total employment supported BY this country's exports"}
      - {name: export_emp_share_pct,    type: float, unit: percent,   description: "Export-supported employment as % of total"}
      - {name: domestic_share_pct,      type: float, unit: percent,   description: "Domestic share of export-supported employment"}
      - {name: spillover_share_pct,     type: float, unit: percent,   description: "Spillover share of export-supported employment"}
  industry_table4:
    file: industry_table4.csv
    description: "10×10 sector matrix — employment supported (rows: employing sector, cols: exporting sector)"
    index_column: sector
    columns:
      - {name: "A",   type: float, description: "Agriculture, forestry and fishing"}
      - {name: "B-E", type: float, description: "Mining, manufacturing, utilities"}
      - {name: "F",   type: float, description: "Construction"}
      - {name: "G-I", type: float, description: "Wholesale, retail, transport, hotels"}
      - {name: "J",   type: float, description: "Information and communication"}
      - {name: "K",   type: float, description: "Financial and insurance activities"}
      - {name: "L",   type: float, description: "Real estate activities"}
      - {name: "M-N", type: float, description: "Professional, scientific and admin services"}
      - {name: "O-Q", type: float, description: "Public admin, education, health"}
      - {name: "R-U", type: float, description: "Arts, entertainment and other services"}
  industry_figure3:
    file: industry_figure3.csv
    description: "One row per 10-sector group — domestic vs spillover employment breakdown"
    key_column: sector
    columns:
      - {name: sector,               type: str,   description: "10-sector code (e.g. B-E, G-I)"}
      - {name: total_employment_THS, type: float, unit: thousands, description: "Total employment in sector"}
      - {name: domestic_THS,         type: float, unit: thousands, description: "Domestic employment component"}
      - {name: spillover_THS,        type: float, unit: thousands, description: "Spillover employment component"}

limitations:
  - "Product-by-product vs industry-by-industry IC-IOT (paper footnote 6) — public data only provides p×p"
  - "Employment data vintage differences between paper and publicly available Eurostat data"
  - "Upward bias from uniform employment coefficients within each country-industry cell (paper footnote 5)"
  - "Missing non-public ESA 2010 imputations used in the original paper"
  - "LU and MT: missing confidential employment data in Eurostat; zero-filled, causing underestimation"
